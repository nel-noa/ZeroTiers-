<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MC TIERS GOD - ZERO TIERS UPGRADED</title><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"><style>
body {
  margin:0;
  font-family:'Press Start 2P', cursive;
  color:white;
  background: radial-gradient(circle at top, #220000, #000000);
  overflow-x:hidden;
}

/* FIRE BACKGROUND EFFECT */
.fire-bg {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:-1;
  background: radial-gradient(circle at bottom, rgba(255,60,0,0.25), transparent 60%),
              radial-gradient(circle at top, rgba(255,140,0,0.15), transparent 70%);
  animation: flicker 2s infinite alternate;
}

@keyframes flicker {
  0% { filter: brightness(1); }
  100% { filter: brightness(1.3); }
}

header {
  background:#111;
  padding:15px;
  text-align:center;
  border-bottom:2px solid orange;
}

input, button, select {
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
  font-family:inherit;
}

button {
  cursor:pointer;
  background:orange;
  color:black;
  font-weight:bold;
}

.container { padding:20px; }
.panel { background:rgba(20,20,20,0.85); padding:15px; border-radius:10px; margin-top:20px; }
.hidden { display:none; }

.player {
  background:#222;
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:10px;
  align-items:center;
  margin:8px 0;
}

.player img { border-radius:6px; }

.rank {
  font-size:10px;
  color:gold;
}
</style></head><body>
<div class="fire-bg"></div><header>
<h1>🔥 MC TIERS GOD - ZERO TIERS UPGRADED</h1>
<input id="search" placeholder="Search player..." onkeyup="searchPlayer()" />
</header><div class="container" id="players"></div>
<div class="container panel" id="leaderboard"></div>
<div class="container panel" id="compare"></div>
<div class="container panel" id="matches"></div><!-- LOGIN --><div class="container" id="login">
<h2>Admin Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div><!-- ADMIN --><div class="container hidden panel" id="admin">
<h2>⚙️ ADMIN PANEL</h2><input id="pname" placeholder="Player Name">
<input id="sword" placeholder="Sword Tier (HT1, LT1...)">
<input id="uhc" placeholder="UHC Tier">
<input id="axe" placeholder="Axe Tier">
<input id="mace" placeholder="Mace Tier">
<input id="spear" placeholder="Spear Tier">
<input id="icon" placeholder="Icon URL">
<button onclick="addPlayer()">➕ Add / Update Player</button><h3>⚔️ Add Match</h3>
<select id="m1"></select>
<select id="m2"></select>
<select id="winner">
<option value="1">Player 1 Wins</option>
<option value="2">Player 2 Wins</option>
</select>
<button onclick="addMatch()">Add Match</button><h3>Manage Players</h3>
<div id="adminList"></div>
</div><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script><script>
// FIREBASE (PUT YOUR CONFIG)
const firebaseConfig = {
  apiKey: "PUT_HERE",
  authDomain: "PUT_HERE",
  databaseURL: "PUT_HERE",
  projectId: "PUT_HERE",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ADMIN LOGIN
const admins = [
  {user:"Sasuke", pass:"abdelrhmfadf134"}
];

let players = [];
let matches = [];
let editIndex = null;

// 🔥 EXPONENTIAL TIER SYSTEM
const tierPoints = {
HT1: 640,
LT1: 320,
HT2: 160,
LT2: 80,
HT3: 40,
LT3: 20,
HT4: 10,
LT4: 5,
HT5: 2,
LT5: 1
};

function getPoints(t){ return tierPoints[t?.toUpperCase()] || 0; }

function calcOverall(p){
  return (
    getPoints(p.sword) +
    getPoints(p.uhc) +
    getPoints(p.axe) +
    getPoints(p.mace) +
    getPoints(p.spear)
  );
}

function getRank(score){
  if(score > 1000) return "GOD";
  if(score > 600) return "S+";
  if(score > 300) return "S";
  if(score > 150) return "A";
  if(score > 80) return "B";
  return "C";
}

function login(){
  let ok = admins.find(a=>a.user===user.value && a.pass===pass.value);
  if(ok) document.getElementById("admin").classList.remove("hidden");
}

function addPlayer(){
  let p = {
    name:pname.value,
    sword:sword.value,
    uhc:uhc.value,
    axe:axe.value,
    mace:mace.value,
    spear:spear.value,
    icon:icon.value
  };

  if(editIndex!==null){
    players[editIndex]=p;
    db.ref("players").set(players);
    editIndex=null;
  } else {
    db.ref("players").push(p);
  }
}

function edit(i){
  let p=players[i];
  pname.value=p.name;
  sword.value=p.sword;
  uhc.value=p.uhc;
  axe.value=p.axe;
  mace.value=p.mace;
  spear.value=p.spear;
  icon.value=p.icon;
  editIndex=i;
}

function del(i){
  players.splice(i,1);
  db.ref("players").set(players);
}

function addMatch(){
  let p1=m1.value;
  let p2=m2.value;
  let win = winner.value;

  let match={p1,p2,winner:win=="1"?p1:p2,time:Date.now()};
  db.ref("matches").push(match);
}

function render(){
  let c=document.getElementById("players");
  c.innerHTML="";

  let sorted=[...players].sort((a,b)=>calcOverall(b)-calcOverall(a));

  sorted.forEach(p=>{
    let div=document.createElement("div");
    let score=calcOverall(p);

    div.className="player";
    div.innerHTML=`
      <img src='${p.icon}' width='40'>
      <div>
        <b>${p.name}</b><br>
        🏆 ${score} pts <span class='rank'>[${getRank(score)}]</span>
      </div>`;

    c.appendChild(div);
  });

  renderLeaderboard();
  renderAdmin();
  renderCompare();
}

function renderLeaderboard(){
  let lb=document.getElementById("leaderboard");
  let sorted=[...players].sort((a,b)=>calcOverall(b)-calcOverall(a));

  lb.innerHTML="<h2>🏆 LEADERBOARD</h2>";

  sorted.forEach((p,i)=>{
    lb.innerHTML+=`#${i+1} ${p.name} - ${calcOverall(p)} pts<br>`;
  });
}

function renderAdmin(){
  let list=document.getElementById("adminList");
  let s1=document.getElementById("m1");
  let s2=document.getElementById("m2");

  list.innerHTML="";
  s1.innerHTML="";
  s2.innerHTML="";

  players.forEach((p,i)=>{
    list.innerHTML+=`
      <p>${p.name}
      <button onclick="edit(${i})">✏️</button>
      <button onclick="del(${i})">❌</button></p>`;

    s1.innerHTML+=`<option>${p.name}</option>`;
    s2.innerHTML+=`<option>${p.name}</option>`;
  });
}

function renderCompare(){
  let c=document.getElementById("compare");

  c.innerHTML=`
  <h2>⚔️ Compare</h2>
  <select id='c1'></select>
  <select id='c2'></select>
  <button onclick='doCompare()'>Compare</button>
  <div id='result'></div>`;

  players.forEach(p=>{
    c1.innerHTML+=`<option>${p.name}</option>`;
    c2.innerHTML+=`<option>${p.name}</option>`;
  });
}

function doCompare(){
  let p1=players.find(p=>p.name===c1.value);
  let p2=players.find(p=>p.name===c2.value);

  let s1=calcOverall(p1);
  let s2=calcOverall(p2);

  let w=s1>s2?p1.name:p2.name;

  result.innerHTML=`${p1.name}: ${s1}<br>${p2.name}: ${s2}<h3>🏆 ${w}</h3>`;
}

function searchPlayer(){
  let v=search.value.toLowerCase();

  document.querySelectorAll(".player").forEach(p=>{
    p.style.display=p.innerText.toLowerCase().includes(v)?"flex":"none";
  });
}

// realtime
 db.ref("players").on("value",snap=>{
  players=snap.val()?Object.values(snap.val()):[];
  render();
});

 db.ref("matches").on("value",snap=>{
  matches=snap.val()?Object.values(snap.val()):[];
});

</script></body>
  </html>
