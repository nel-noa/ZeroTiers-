<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZeroTiers</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

header {
  background:#1a1a1a;
  padding:15px;
  text-align:center;
  border-bottom:2px solid #ff9800;
}

h1 { margin:0; font-size:24px; }

.container { padding:15px; }

.card {
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

input, button, select {
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
}

button {
  background:#ff9800;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.player {
  display:flex;
  justify-content:space-between;
  padding:8px;
  background:#2a2a2a;
  margin:5px 0;
  border-radius:6px;
}

.rank { color:gold; }

.hidden { display:none; }
</style>
</head>

<body>

<header>
<h1>ZeroTiers System</h1>
<input id="search" placeholder="Search player..." onkeyup="searchPlayer()">
</header>

<div class="container">

<!-- LEADERBOARD -->
<div class="card">
<h2>🏆 Leaderboard</h2>
<div id="leaderboardList"></div>
</div>

<!-- PLAYERS -->
<div class="card">
<h2>👤 Players</h2>
<div id="players"></div>
</div>

<!-- MATCH HISTORY -->
<div class="card">
<h2>⚔️ Match History</h2>
<div id="matches"></div>
</div>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>Admin Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div class="card hidden" id="admin">
<h2>⚙️ Admin Panel</h2>

<input id="name" placeholder="Name">
<input id="sword" placeholder="Sword Tier">
<input id="uhc" placeholder="UHC Tier">
<input id="axe" placeholder="Axe Tier">
<input id="mace" placeholder="Mace Tier">
<input id="spear" placeholder="Spear Tier">
<input id="icon" placeholder="Icon URL">

<button onclick="addPlayer()">Add / Update</button>

<h3>Add Match</h3>
<select id="p1"></select>
<select id="p2"></select>
<select id="winner">
<option value="1">P1 Wins</option>
<option value="2">P2 Wins</option>
</select>
<button onclick="addMatch()">Add Match</button>

<h3>Leaderboard Control</h3>
<div id="adminList"></div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PUT_HERE",
  authDomain: "PUT_HERE",
  databaseURL: "PUT_HERE",
  projectId: "PUT_HERE",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LOGIN */
const adminUser = "admin";
const adminPass = "Zero1234";

/* DATA */
let players = [];
let matches = [];
let editIndex = null;

/* DOM */
const loginBox = document.getElementById("loginBox");
const admin = document.getElementById("admin");

/* TIER SYSTEM */
const tier = {
HT1:640, LT1:320,
HT2:160, LT2:80,
HT3:40, LT3:20,
HT4:10, LT4:5,
HT5:2, LT5:1
};

function pts(t){ return tier[t?.toUpperCase()] || 0; }

function score(p){
  return pts(p.sword)+pts(p.uhc)+pts(p.axe)+pts(p.mace)+pts(p.spear);
}

function rank(s){
  if(s>1000) return "GOD";
  if(s>600) return "S+";
  if(s>300) return "S";
  if(s>150) return "A";
  return "B";
}

/* LOGIN FIXED */
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u===adminUser && p===adminPass){
    admin.classList.remove("hidden");
    loginBox.classList.add("hidden");
  } else {
    alert("Wrong login");
  }
}

/* PLAYER SYSTEM */
function addPlayer(){
  const p = {
    name:name.value,
    sword:sword.value,
    uhc:uhc.value,
    axe:axe.value,
    mace:mace.value,
    spear:spear.value,
    icon:icon.value
  };

  if(editIndex!==null){
    players[editIndex]=p;
    db.ref("players").set(players);
    editIndex=null;
  } else {
    db.ref("players").push(p);
  }
}

/* MATCH */
function addMatch(){
  const a=p1.value;
  const b=p2.value;
  const win = winner.value=="1"?a:b;

  db.ref("matches").push({
    p1:a,
    p2:b,
    winner:win,
    time:Date.now()
  });
}

/* EDIT SCORE (LEADERBOARD CONTROL) */
function editScore(i){
  let newScore = prompt("Set manual score for " + players[i].name);
  if(newScore !== null){
    players[i].manualScore = parseInt(newScore);
    db.ref("players").set(players);
  }
}

/* DELETE */
function del(i){
  players.splice(i,1);
  db.ref("players").set(players);
}

/* RENDER */
function render(){

  /* PLAYERS */
  playersDiv.innerHTML="";
  let sorted=[...players].sort((a,b)=>score(b)-score(a));

  sorted.forEach(p=>{
    playersDiv.innerHTML+=`
    <div class="player">
      <span>${p.name}</span>
      <span>${score(p)} pts <b class="rank">${rank(score(p))}</b></span>
    </div>`;
  });

  /* LEADERBOARD */
  leaderboardList.innerHTML="";
  sorted.forEach((p,i)=>{
    leaderboardList.innerHTML+=`#${i+1} ${p.name} - ${score(p)} pts<br>`;
  });

  /* ADMIN */
  adminList.innerHTML="";
  p1.innerHTML="";
  p2.innerHTML="";

  players.forEach((p,i)=>{
    adminList.innerHTML+=`
    <div>
      ${p.name}
      <button onclick="editScore(${i})">Score</button>
      <button onclick="del(${i})">Delete</button>
    </div>`;

    p1.innerHTML+=`<option>${p.name}</option>`;
    p2.innerHTML+=`<option>${p.name}</option>`;
  });

  /* MATCHES */
  matchesDiv.innerHTML="";
  matches.forEach(m=>{
    matchesDiv.innerHTML+=`
    ${m.p1} vs ${m.p2} → Winner: <b>${m.winner}</b><br>`;
  });
}

/* SEARCH */
function searchPlayer(){
  let v=search.value.toLowerCase();
  document.querySelectorAll(".player").forEach(p=>{
    p.style.display=p.innerText.toLowerCase().includes(v)?"flex":"none";
  });
}

/* FIREBASE */
db.ref("players").on("value",s=>{
  players=s.val()?Object.values(s.val()):[];
  render();
});

db.ref("matches").on("value",s=>{
  matches=s.val()?Object.values(s.val()):[];
  render();
});
</script>

</body>
</html>
